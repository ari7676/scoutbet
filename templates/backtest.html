<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest — MatchIQ</title>
<style>
  :root {
    --bg: #0B1420; --surface: #111c2e; --border: #1e2d45;
    --green: #00E28A; --green-dim: rgba(0,226,138,0.12);
    --amber: #F5A623; --amber-dim: rgba(245,166,35,0.12);
    --red: #E24B4A; --red-dim: rgba(226,75,74,0.12);
    --blue: #4A9EFF; --text: #e8edf5; --muted: #6b7a99; --card: #131f33;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); }
  header a { color: var(--muted); text-decoration: none; font-size: 13px; }
  header a:hover { color: var(--text); }
  header h1 { font-family: 'Oswald', sans-serif; font-size: 20px; color: var(--green); letter-spacing: 0.5px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .metric-card .val { font-size: 28px; font-weight: 600; color: var(--green); display: block; font-family: 'JetBrains Mono', monospace; }
  .metric-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }
  section { margin-bottom: 32px; }
  section h2 { font-family: 'Oswald', sans-serif; font-size: 16px; color: var(--text); letter-spacing: 0.5px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(30,45,69,0.5); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: var(--green-dim); color: var(--green); }
  .badge-warn { background: var(--amber-dim); color: var(--amber); }
  .badge-bad { background: var(--red-dim); color: var(--red); }
  .bar-bg { background: var(--border); border-radius: 3px; height: 5px; width: 80px; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 5px; border-radius: 3px; display: block; }
  .num { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .muted { color: var(--muted); }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .err { text-align: center; padding: 40px; color: var(--red); }
  .diff-pos { color: var(--green); font-weight: 600; }
  .diff-neg { color: var(--red); font-weight: 600; }
  .diff-neu { color: var(--muted); }
  .hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <a href="/">← MatchIQ</a>
  <h1>⚙ BACKTEST</h1>
</header>
<div class="container">
  <div id="root"><div class="loading">Cargando datos...</div></div>
</div>
<script>
fetch('/backtest/json')
  .then(r => r.json())
  .then(data => {
    if (data.error) { document.getElementById('root').innerHTML = `<div class="err">Error: ${data.error}</div>`; return; }
    renderDashboard(data);
  })
  .catch(e => { document.getElementById('root').innerHTML = `<div class="err">Error: ${e.message}</div>`; });

function bar(pct, color) {
  return `<span class="bar-bg"><span class="bar-fill" style="width:${pct}%;background:${color}"></span></span>`;
}
function accColor(acc) {
  return acc >= 80 ? 'var(--green)' : acc >= 70 ? 'var(--amber)' : 'var(--red)';
}

function renderDashboard(d) {
  const r = d.resumen;
  let html = `
  <div class="metrics-grid">
    <div class="metric-card"><span class="val">${r.total_predicciones}</span><span class="lbl">predicciones verificadas</span></div>
    <div class="metric-card"><span class="val">${r.accuracy_global}%</span><span class="lbl">accuracy global</span></div>
    <div class="metric-card"><span class="val">${r.mercados_evaluados}</span><span class="lbl">mercados evaluados</span></div>
    <div class="metric-card"><span class="val">${r.total_acertadas}</span><span class="lbl">aciertos totales</span></div>
  </div>
  <section>
    <h2>Accuracy por mercado</h2>
    <table><thead><tr><th>Mercado</th><th>N</th><th>Aciertos</th><th>Accuracy</th><th>Prob media</th><th>Umbral</th><th>Estado</th></tr></thead><tbody>`;

  (d.por_mercado || []).forEach(m => {
    const c = accColor(m.accuracy);
    const b = m.estado === 'bueno' ? 'badge-ok' : m.estado === 'marginal' ? 'badge-warn' : 'badge-bad';
    const label = m.estado === 'bueno' ? 'Bueno' : m.estado === 'marginal' ? 'Marginal' : 'Bajo';
    html += `<tr><td>${m.mercado}</td><td class="num">${m.n}</td><td class="num">${m.ok}</td>
      <td>${bar(m.accuracy, c)} <span class="num" style="color:${c}">${m.accuracy}%</span></td>
      <td class="num muted">${m.prob_media}%</td><td class="num">${m.umbral_actual}%</td>
      <td><span class="badge ${b}">${label}</span></td></tr>`;
  });

  html += `</tbody></table></section>
  <section>
    <h2>Calibración — prob declarada vs acierto real</h2>
    <p class="hint">Un modelo bien calibrado tiene accuracy real ≈ probabilidad declarada.</p>
    <table><thead><tr><th>Rango prob</th><th>N</th><th>Accuracy real</th><th>Diferencia</th><th>Diagnóstico</th></tr></thead><tbody>`;

  (d.calibracion || []).forEach(b => {
    const diff = b.diferencia;
    const diffStr = (diff >= 0 ? '+' : '') + diff + 'pp';
    const diffClass = Math.abs(diff) <= 5 ? 'diff-pos' : Math.abs(diff) <= 10 ? 'diff-neu' : 'diff-neg';
    const diag = Math.abs(diff) <= 5 ? 'Bien calibrado' : Math.abs(diff) <= 10 ? 'Leve sesgo' : 'Recalibrar';
    html += `<tr><td class="num">${b.rango}</td><td class="num">${b.n}</td>
      <td>${bar(b.accuracy_real, accColor(b.accuracy_real))} <span class="num">${b.accuracy_real}%</span></td>
      <td class="num ${diffClass}">${diffStr}</td><td class="muted" style="font-size:12px">${diag}</td></tr>`;
  });

  html += `</tbody></table></section>
  <section>
    <h2>Umbrales óptimos sugeridos</h2>
    <p class="hint">Umbral que maximiza accuracy sin perder más del 70% de cobertura.</p>
    <table><thead><tr><th>Mercado</th><th>Umbral actual</th><th>Umbral óptimo</th><th>Acc. actual</th><th>Acc. óptima</th><th>Ganancia</th><th>Cobertura</th></tr></thead><tbody>`;

  (d.umbrales_optimos || []).forEach(u => {
    const changed = u.umbral_actual !== u.umbral_optimo;
    const gain = u.ganancia_acc;
    const gainStr = (gain >= 0 ? '+' : '') + gain.toFixed(1) + 'pp';
    const gainClass = gain > 0 ? 'diff-pos' : gain < 0 ? 'diff-neg' : 'diff-neu';
    const cobStr = u.perdida_cobertura >= 0 ? `+${u.perdida_cobertura}` : u.perdida_cobertura;
    html += `<tr><td>${u.mercado}</td><td class="num">${u.umbral_actual}%</td>
      <td class="num" style="color:${changed ? 'var(--blue)' : 'var(--muted)'}; font-weight:${changed ? 600 : 400}">${u.umbral_optimo}%${changed ? ' ↑' : ''}</td>
      <td class="num">${u.accuracy_actual}%</td><td class="num">${u.accuracy_optima}%</td>
      <td class="num ${gainClass}">${gainStr}</td><td class="num muted">${cobStr} pred.</td></tr>`;
  });

  html += `</tbody></table></section>`;
  document.getElementById('root').innerHTML = html;
}
</script>
</body>
</html>
