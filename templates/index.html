<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutBet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10;--card:#111318;--card2:#181c24;--border:rgba(255,255,255,0.07);
  --gold:#f0b429;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--amber:#f59e0b;
  --text:#e8eaf0;--muted:#6b7280;--dim:#9ca3af;
  --green-bg:rgba(74,222,128,0.08);--red-bg:rgba(248,113,113,0.08);
  --amber-bg:rgba(245,158,11,0.08);--blue-bg:rgba(96,165,250,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
select{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;}
.btn-buscar{background:var(--gold);color:#0a0c10;border:none;border-radius:7px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.btn-buscar:disabled{opacity:0.4;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 53px);}

/* LISTA */
.lista-panel{border-right:1px solid var(--border);overflow-y:auto;background:var(--card);}
.lista-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);display:flex;justify-content:space-between;}
.match-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.match-item:hover{background:var(--card2);}
.match-item.active{background:var(--card2);border-left:2px solid var(--gold);}
.mi-teams{font-weight:600;font-size:13px;margin-bottom:3px;}
.mi-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.mi-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;font-family:'DM Mono',monospace;margin-top:5px;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.badge-gray{background:rgba(107,114,128,0.1);color:var(--muted);border:1px solid rgba(107,114,128,0.15);}

/* DETALLE */
.detalle-panel{overflow-y:auto;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px;}
.empty-icon{font-size:36px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--dim);letter-spacing:1px;}

/* STATUS */
.status-bar{padding:7px 24px;font-family:'DM Mono',monospace;font-size:11px;display:none;border-bottom:1px solid var(--border);}
.status-bar.ok{background:rgba(74,222,128,0.04);color:var(--green);}
.status-bar.err{background:rgba(248,113,113,0.04);color:var(--red);}
.status-bar.loading{background:rgba(240,180,41,0.04);color:var(--gold);}

/* ── CARD COMPLETA ── */
.card{max-width:800px;margin:0 auto;padding:24px 20px 48px;}

/* Header */
.card-header{background:linear-gradient(135deg,#0f1319,#151a24);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:12px;}
.comp-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.2);margin-bottom:12px;}
.teams-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;}
.team-away{color:var(--muted);}
.vs-sep{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.match-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* Filtros */
.filters-row{display:flex;flex-wrap:wrap;gap:5px;padding:12px 0;border-top:1px solid var(--border);margin-top:10px;}
.filter-tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.2);}

/* Sección genérica */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.section-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;}

/* Stats de temporada */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.stats-col{padding:16px;}
.stats-col:first-child{border-right:1px solid var(--border);}
.stats-team-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px;}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{color:var(--muted);}
.stat-val{font-family:'DM Mono',monospace;font-weight:600;color:var(--text);}

/* Distribución temporal */
.time-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:14px 16px;}
.time-block{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;}
.time-block.hot-green{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);}
.time-block.hot-blue{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);}
.time-block.warm{background:rgba(124,108,255,0.1);border-color:rgba(124,108,255,0.2);}
.time-tramo{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:4px;}
.time-pct{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;}
.hot-green .time-pct{color:var(--green);}
.hot-blue .time-pct{color:var(--blue);}
.warm .time-pct{color:#9d8fff;}
.time-block:not(.hot-green):not(.hot-blue):not(.warm) .time-pct{color:var(--muted);}
.time-team-label{font-size:10px;font-weight:600;color:var(--dim);padding:8px 16px 0;margin-top:4px;}

/* Forma reciente */
.forma-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.forma-col{padding:14px 16px;}
.forma-col:first-child{border-right:1px solid var(--border);}
.forma-team{font-size:11px;font-weight:700;margin-bottom:8px;}
.result-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;}
.result-date{font-family:'DM Mono',monospace;color:var(--muted);min-width:70px;}
.result-opp{flex:1;color:var(--dim);}
.result-score{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}
.score-w{background:var(--green-bg);color:var(--green);}
.score-d{background:var(--amber-bg);color:var(--amber);}
.score-l{background:var(--red-bg);color:var(--red);}

/* Árbitro */
.arbitro-content{padding:14px 16px;display:flex;gap:16px;align-items:flex-start;}
.arbitro-name{font-weight:700;font-size:13px;margin-bottom:4px;}
.arbitro-detail{font-size:12px;color:var(--muted);line-height:1.6;}

/* Mercados */
.markets-table{width:100%;}
.market-row{display:grid;grid-template-columns:1fr 70px 60px;align-items:start;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);}
.market-row:last-child{border-bottom:none;}
.market-row.aprobado{border-left:2px solid var(--green);}
.market-row.informativo{opacity:0.55;}
.market-name{font-weight:600;font-size:13px;margin-bottom:4px;}
.market-synthesis{font-size:11px;color:var(--muted);line-height:1.5;}
.prob-cell{text-align:center;}
.prob-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;}
.prob-green{color:var(--green);}
.prob-amber{color:var(--amber);}
.prob-red{color:var(--red);}
.prob-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;}
.risk-cell{text-align:center;}
.risk-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;}
.risk-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;}

/* Jugadores */
.players-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 16px;}
.player-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.player-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;margin-bottom:8px;}
.avatar-atk{background:linear-gradient(135deg,#4ade80,#22c55e);}
.avatar-def{background:linear-gradient(135deg,#f59e0b,#f97316);}
.player-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.player-team{font-size:10px;color:var(--muted);margin-bottom:6px;}
.player-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.player-bar-fill{height:100%;border-radius:2px;}
.fill-atk{background:linear-gradient(90deg,var(--green),#22c55e);}
.fill-def{background:linear-gradient(90deg,var(--amber),#f97316);}
.player-prob{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:5px;}
.player-note{font-size:10px;color:var(--muted);line-height:1.4;}

/* Veredicto */
.veredicto{margin:0;padding:16px 20px;background:linear-gradient(135deg,#13151d,#1a1d28);border:1px solid rgba(240,180,41,0.2);border-radius:12px;margin-bottom:10px;}
.veredicto-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:8px;font-weight:600;}
.veredicto-main{font-size:15px;font-weight:700;margin-bottom:6px;}
.veredicto-detail{font-size:12px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">⚡ ScoutBet</div>
  <div class="topbar-right">
    <select id="liga">
      {% for id, nombre in ligas.items() %}
      <option value="{{ id }}">{{ nombre }}</option>
      {% endfor %}
    </select>
    <select id="temporada">
      <option value="2024" selected>2024</option>
      <option value="2023">2023</option>
    </select>
    <button class="btn-buscar" id="btn" onclick="buscar()">→ Buscar</button>
  </div>
</div>

<div class="status-bar" id="st"></div>

<div class="layout">
  <div class="lista-panel">
    <div class="lista-header">
      <span>Partidos</span>
      <span id="count"></span>
    </div>
    <div id="lista"></div>
  </div>

  <div class="detalle-panel" id="detalle">
    <div class="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">ScoutBet</div>
      <div style="font-size:12px;color:var(--muted)">Buscá partidos y hacé click para analizar</div>
    </div>
  </div>
</div>

<script>
let analisisCache = {};

async function buscar(){
  const liga = document.getElementById('liga').value;
  const temp = document.getElementById('temporada').value;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  show('loading','⏳ Buscando partidos...');
  document.getElementById('lista').innerHTML = '';
  document.getElementById('count').textContent = '';
  analisisCache = {};

  try {
    const r = await fetch(`/partidos/${liga}/${temp}`);
    const data = await r.json();
    const fx = data.response || [];
    if(!fx.length){ show('ok','Sin partidos para esta selección.'); btn.disabled=false; return; }
    show('ok', `✓ ${fx.length} partidos encontrados`);
    document.getElementById('count').textContent = fx.length;
    renderLista(fx);
  } catch(e){ show('err','✗ '+e.message); }
  btn.disabled = false;
}

function renderLista(fx){
  document.getElementById('lista').innerHTML = fx.map(f => {
    const d = new Date(f.fixture.date);
    const fecha = d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
    const hora = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="match-item" id="item-${f.fixture.id}" onclick="analizar(${f.fixture.id},'${f.league.name}','${f.teams.home.name}','${f.teams.away.name}','${fecha}','${hora}')">
      <div class="mi-teams">${f.teams.home.name} <span style="color:var(--muted);font-weight:400">vs</span> ${f.teams.away.name}</div>
      <div class="mi-meta">${fecha} · ${hora}</div>
      <span class="mi-badge badge-gray" id="badge-${f.fixture.id}">Click para analizar</span>
    </div>`;
  }).join('');
}

async function analizar(fid, liga, local, visitante, fecha, hora){
  document.querySelectorAll('.match-item').forEach(e=>e.classList.remove('active'));
  document.getElementById(`item-${fid}`).classList.add('active');

  if(analisisCache[fid]){
    renderCard(analisisCache[fid], liga, local, visitante, fecha, hora);
    return;
  }

  document.getElementById('detalle').innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Analizando...</div></div>`;

  try {
    const r = await fetch(`/analizar/${fid}`);
    const d = await r.json();
    analisisCache[fid] = d;

    const aprobados = d.mercados.filter(m=>m.tipo==='aprobado').length;
    const badge = document.getElementById(`badge-${fid}`);
    if(badge){
      badge.className = aprobados > 0 ? 'mi-badge badge-green' : 'mi-badge badge-gray';
      badge.textContent = aprobados > 0 ? `✓ ${aprobados} aprobado${aprobados>1?'s':''}` : 'Sin señales';
    }

    renderCard(d, liga, local, visitante, fecha, hora);
  } catch(e){
    document.getElementById('detalle').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div><div style="color:var(--red)">Error al analizar</div></div>`;
  }
}

function renderCard(d, liga, local, visitante, fecha, hora){
  const aprobados = d.mercados.filter(m=>m.tipo==='aprobado').length;

  // Datos de ejemplo hardcodeados hasta tener API completa
  const statsLocal = { remates: 14.2, rematesArco: 4.8, goles: 1.65, victoriasCasa: '58%' };
  const statsVisit = { remates: 10.8, rematesArco: 3.2, goles: 1.12, victoriasVisita: '28%' };

  const tiemposLocal = [
    {tramo:'1-15\'',pct:12,clase:''},
    {tramo:'16-30\'',pct:15,clase:'warm'},
    {tramo:'31-45\'',pct:18,clase:'warm'},
    {tramo:'46-60\'',pct:16,clase:''},
    {tramo:'61-75\'',pct:22,clase:'hot-green'},
    {tramo:'76-90\'',pct:17,clase:'hot-blue'},
  ];
  const tiemposVisit = [
    {tramo:'1-15\'',pct:10,clase:''},
    {tramo:'16-30\'',pct:14,clase:''},
    {tramo:'31-45\'',pct:19,clase:'hot-blue'},
    {tramo:'46-60\'',pct:21,clase:'hot-green'},
    {tramo:'61-75\'',pct:18,clase:'warm'},
    {tramo:'76-90\'',pct:18,clase:'warm'},
  ];

  const forma = {
    local: [
      {fecha:'12 Abr',opp:'vs River',score:'2-1',tipo:'w'},
      {fecha:'08 Abr',opp:'vs Boca',score:'1-1',tipo:'d'},
      {fecha:'04 Abr',opp:'at Racing',score:'0-2',tipo:'l'},
    ],
    visit: [
      {fecha:'13 Abr',opp:'at San Lorenzo',score:'1-0',tipo:'w'},
      {fecha:'07 Abr',opp:'vs Independiente',score:'2-2',tipo:'d'},
      {fecha:'02 Abr',opp:'at Estudiantes',score:'1-3',tipo:'l'},
    ]
  };

  const jugadores = {
    atacantes: [
      {ini:'LP',nombre:'J. Gómez',equipo:local,prob:72,nota:'Principal goleador del equipo. 8 goles en la temporada.'},
      {ini:'MR',nombre:'M. Rodríguez',equipo:local,prob:58,nota:'Extremo creativo. Promedio 1 asistencia cada 2 partidos.'},
      {ini:'CS',nombre:'C. Silva',equipo:visitante,prob:61,nota:'Delantero titular. Anotó en los últimos 2 partidos fuera.'},
      {ini:'FA',nombre:'F. Álvarez',equipo:visitante,prob:44,nota:'Mediocampista goleador. Amenaza desde segunda línea.'},
    ],
    defensores: [
      {ini:'DT',nombre:'D. Torres',equipo:local,prob:35,nota:'Historial de tarjetas en partidos de alta presión.'},
      {ini:'MV',nombre:'M. Vargas',equipo:visitante,prob:42,nota:'Defensor central que acumula faltas ante rivales rápidos.'},
    ]
  };

  document.getElementById('detalle').innerHTML = `
  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="comp-badge">🏆 ${liga}</div>
      <div class="teams-row">
        <div class="team-name">${local}</div>
        <div class="vs-sep">vs</div>
        <div class="team-name team-away">${visitante}</div>
      </div>
      <div class="match-info">📅 ${fecha} · ${hora} · ⚡ ${aprobados} mercado${aprobados!==1?'s':''} aprobado${aprobados!==1?'s':''} · Prob. base local: ${d.prob_base}%</div>
      <div class="filters-row">
        ${d.filtros.length
          ? d.filtros.map(f=>`<span class="filter-tag">${f.codigo} ${f.descripcion}</span>`).join('')
          : '<span style="font-size:11px;color:var(--muted)">Sin filtros detectados para este partido</span>'}
      </div>
    </div>

    <!-- STATS DE TEMPORADA -->
    <div class="section">
      <div class="section-header">📊 Estadísticas de Temporada</div>
      <div class="stats-grid">
        <div class="stats-col">
          <div class="stats-team-name">${local}</div>
          <div class="stat-row"><span class="stat-lbl">Remates / partido</span><span class="stat-val">${statsLocal.remates}</span></div>
          <div class="stat-row"><span class="stat-lbl">Al arco / partido</span><span class="stat-val">${statsLocal.rematesArco}</span></div>
          <div class="stat-row"><span class="stat-lbl">Goles / partido</span><span class="stat-val">${statsLocal.goles}</span></div>
          <div class="stat-row"><span class="stat-lbl">Victorias en casa</span><span class="stat-val">${statsLocal.victoriasCasa}</span></div>
        </div>
        <div class="stats-col">
          <div class="stats-team-name">${visitante}</div>
          <div class="stat-row"><span class="stat-lbl">Remates / partido</span><span class="stat-val">${statsVisit.remates}</span></div>
          <div class="stat-row"><span class="stat-lbl">Al arco / partido</span><span class="stat-val">${statsVisit.rematesArco}</span></div>
          <div class="stat-row"><span class="stat-lbl">Goles / partido</span><span class="stat-val">${statsVisit.goles}</span></div>
          <div class="stat-row"><span class="stat-lbl">Victorias de visita</span><span class="stat-val">${statsVisit.victoriasVisita}</span></div>
        </div>
      </div>
    </div>

    <!-- DISTRIBUCIÓN TEMPORAL -->
    <div class="section">
      <div class="section-header">⏱ Distribución Temporal de Goles</div>
      <div class="time-team-label">${local}</div>
      <div class="time-grid">
        ${tiemposLocal.map(t=>`<div class="time-block ${t.clase}"><div class="time-tramo">${t.tramo}</div><div class="time-pct">${t.pct}%</div></div>`).join('')}
      </div>
      <div class="time-team-label" style="border-top:1px solid var(--border);padding-top:10px;">${visitante}</div>
      <div class="time-grid">
        ${tiemposVisit.map(t=>`<div class="time-block ${t.clase}"><div class="time-tramo">${t.tramo}</div><div class="time-pct">${t.pct}%</div></div>`).join('')}
      </div>
    </div>

    <!-- FORMA RECIENTE -->
    <div class="section">
      <div class="section-header">📋 Forma Reciente</div>
      <div class="forma-grid">
        <div class="forma-col">
          <div class="forma-team">${local}</div>
          ${forma.local.map(r=>`<div class="result-row">
            <span class="result-date">${r.fecha}</span>
            <span class="result-opp">${r.opp}</span>
            <span class="result-score score-${r.tipo}">${r.score}</span>
          </div>`).join('')}
        </div>
        <div class="forma-col">
          <div class="forma-team">${visitante}</div>
          ${forma.visit.map(r=>`<div class="result-row">
            <span class="result-date">${r.fecha}</span>
            <span class="result-opp">${r.opp}</span>
            <span class="result-score score-${r.tipo}">${r.score}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- ÁRBITRO -->
    <div class="section">
      <div class="section-header">🟨 Árbitro</div>
      <div class="arbitro-content">
        <div>
          <div class="arbitro-name">Por confirmar</div>
          <div class="arbitro-detail">Promedio tarjetas: — · Sesgo local/visitante: — · Historial vs equipos: —<br>
          <span style="color:var(--amber);font-size:11px;">⚠ Dato disponible cuando se confirme el árbitro oficial</span></div>
        </div>
      </div>
    </div>

    <!-- MERCADOS -->
    <div class="section">
      <div class="section-header">📈 Mercados Analizados</div>
      <div class="markets-table">
        ${d.mercados.map(m => {
          const pc = m.prob >= 82 ? 'prob-green' : m.prob >= 70 ? 'prob-amber' : 'prob-red';
          const rc = m.riesgo <= 12 ? 'prob-green' : m.riesgo <= 22 ? 'prob-amber' : 'prob-red';
          return `<div class="market-row ${m.tipo}">
            <div>
              <div class="market-name">${m.nombre}</div>
              <div class="market-synthesis">${m.tipo === 'aprobado' ? '✓ Mercado aprobado — probabilidad supera umbral de 82%' : 'Referencial — no alcanza el umbral mínimo'}</div>
            </div>
            <div class="prob-cell">
              <div class="prob-num ${pc}">${m.prob}%</div>
              <div class="prob-lbl">prob.</div>
            </div>
            <div class="risk-cell">
              <div class="risk-num ${rc}">${m.riesgo}%</div>
              <div class="risk-lbl">riesgo</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- JUGADORES DESTACADOS -->
    <div class="section">
      <div class="section-header">⚡ Jugadores Destacados</div>
      <div style="padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Atacantes — Mayor prob. gol/asistencia</div>
      <div class="players-grid">
        ${jugadores.atacantes.map(j=>`<div class="player-card">
          <div class="player-avatar avatar-atk">${j.ini}</div>
          <div class="player-name">${j.nombre}</div>
          <div class="player-team">${j.equipo}</div>
          <div class="player-bar"><div class="player-bar-fill fill-atk" style="width:${j.prob}%"></div></div>
          <div class="player-prob">${j.prob}% prob. participación</div>
          <div class="player-note">${j.nota}</div>
        </div>`).join('')}
      </div>
      <div style="padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-top:1px solid var(--border);">Defensores — Mayor prob. tarjeta</div>
      <div class="players-grid" style="grid-template-columns:repeat(2,1fr);">
        ${jugadores.defensores.map(j=>`<div class="player-card">
          <div class="player-avatar avatar-def">${j.ini}</div>
          <div class="player-name">${j.nombre}</div>
          <div class="player-team">${j.equipo}</div>
          <div class="player-bar"><div class="player-bar-fill fill-def" style="width:${j.prob}%"></div></div>
          <div class="player-prob">${j.prob}% prob. tarjeta</div>
          <div class="player-note">${j.nota}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- VEREDICTO -->
    <div class="veredicto">
      <div class="veredicto-title">🏆 Veredicto Final</div>
      <div class="veredicto-main">Victoria ${local} · Resultado probable: 2-0 o 2-1</div>
      <div class="veredicto-detail">
        Prob. base local: ${d.prob_base}% · Ajuste por filtros: ${d.ajuste_total > 0 ? '+' : ''}${d.ajuste_total}pp · 
        ${aprobados} mercado${aprobados!==1?'s':''} aprobado${aprobados!==1?'s':''} · 
        Mercado favorito: ${d.mercados.find(m=>m.tipo==='aprobado')?.nombre || 'Sin mercados aprobados'}
      </div>
    </div>

  </div>`;
}

function show(t,m){const e=document.getElementById('st');e.style.display='block';e.className='status-bar '+t;e.textContent=m;}
</script>
</body>
</html>
