<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1f;--surface:#0c1529;--surface2:#132040;--surface3:#1a2a52;--border:#1e3060;--gold:#d4a537;--gold2:#b8922e;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;--purple:#a78bfa;--cyan:#06b6d4;--text:#e8eaf0;--muted:#7b8494;--dim:#b0b8c8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:auto;font-size:14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
.brand{display:flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;}
.brand svg{width:22px;height:22px;}
.tb-right{display:flex;align-items:center;gap:12px;}
select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer;min-width:200px;}
.logout-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--muted);font-size:11px;text-decoration:none;font-family:'JetBrains Mono',monospace;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}
.status-bar{padding:8px 20px;font-size:12px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface);color:var(--green);display:none;}
.status-bar.err{color:var(--red);}
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 57px);}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:5px;}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sb-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.sb-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);}
.match-list-wrap{flex:1;overflow-y:auto;}
.match-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .12s;position:relative;}
.match-item:hover{background:var(--surface2);}.match-item.active{background:var(--surface2);border-left:3px solid var(--gold);}
.match-item.finished{opacity:.65;}
.mi-teams{font-weight:600;font-size:14px;line-height:1.5;}.mi-teams span{color:var(--gold);font-weight:400;font-size:12px;}
.mi-result{color:var(--green);font-weight:700;font-size:14px;font-family:'JetBrains Mono',monospace;margin-left:6px;}
.mi-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.mi-jugado{color:var(--green);}
.mi-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;padding:3px 7px;border-radius:4px;font-weight:600;display:none;}
.mi-badge.show{display:block;}.mi-badge.aprobado{background:rgba(34,197,94,.15);color:var(--green);}.mi-badge.pendiente{background:rgba(212,165,55,.1);color:var(--gold);}
.pag{display:flex;justify-content:center;gap:6px;padding:10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.pag-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;color:var(--dim);font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.pag-btn:hover{border-color:var(--gold);color:var(--gold);}.pag-btn.active{background:var(--gold);color:#060d1f;border-color:var(--gold);}
.main-panel{overflow-y:auto;padding:24px 28px;}
.main-panel::-webkit-scrollbar{width:5px;}.main-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;}
.empty svg{width:48px;height:48px;opacity:.3;}.empty p{font-size:14px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}.loading p{color:var(--muted);font-size:13px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gold);margin-bottom:12px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:16px;font-family:'JetBrains Mono',monospace;}
 
/* FILTROS NUEVOS */
.filtros-nuevos{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;margin-bottom:14px;}
.fn-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.fn-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;}
.fn-vals{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.fn-home{font-size:14px;font-weight:700;color:var(--cyan);}.fn-away{font-size:14px;font-weight:700;color:var(--green);}
.fn-desc{font-size:11px;color:var(--dim);line-height:1.5;margin-top:6px;font-style:italic;}
 
.prob-bar{display:flex;height:34px;border-radius:6px;overflow:hidden;margin:10px 0;font-size:13px;font-weight:700;}
.pb-home{background:var(--green);display:flex;align-items:center;justify-content:center;color:#060d1f;min-width:40px;}
.pb-draw{background:var(--muted);display:flex;align-items:center;justify-content:center;color:#fff;min-width:40px;}
.pb-away{background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;min-width:40px;}
.prob-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px;font-weight:600;}
.prob-cuotas{display:flex;justify-content:space-between;font-size:11px;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-top:4px;font-weight:700;}
 
.resumen-box{background:var(--surface2);border-radius:10px;padding:18px 20px;margin-top:14px;border-left:3px solid var(--gold);font-size:13px;color:var(--dim);line-height:1.8;}
.resumen-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-weight:700;}
 
/* TEAM STATS BOXES */
.team-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
.ts-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.ts-header{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;}
.ts-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,48,96,.5);}
.ts-row:last-child{border-bottom:none;}
.ts-lbl{font-size:13px;color:var(--dim);}
.ts-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);}
 
.u3-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.u3-col-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.u3-match{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface2);border-radius:6px;margin-bottom:5px;font-size:13px;border-left:3px solid var(--border);}
.u3-match.W{border-left-color:var(--green);}.u3-match.D{border-left-color:var(--muted);}.u3-match.L{border-left-color:var(--red);}
.u3-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;padding:2px 8px;border-radius:4px;}
.u3-score.W{background:rgba(34,197,94,.15);color:var(--green);}.u3-score.D{background:rgba(107,114,128,.15);color:var(--dim);}.u3-score.L{background:rgba(239,68,68,.15);color:var(--red);}
.u3-comp{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}.u3-fecha{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.arb-box{background:var(--surface2);border-radius:10px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;}
.arb-icon{width:36px;height:36px;background:var(--surface3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.arb-name{font-weight:700;font-size:15px;}.arb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.arb-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-top:6px;}
.forma-row{display:flex;gap:5px;margin-top:4px;}
.f-dot{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.f-dot.W{background:var(--green);}.f-dot.D{background:var(--muted);}.f-dot.L{background:var(--red);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.stat-box{background:var(--surface2);border-radius:6px;padding:10px;text-align:center;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.h2h-row{display:flex;justify-content:center;gap:24px;margin:12px 0;font-family:'JetBrains Mono',monospace;}
.h2h-item{text-align:center;}.h2h-val{font-size:24px;font-weight:700;}.h2h-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.jug-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.jug-card{background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border);}
.jug-top{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.jug-avatar{width:42px;height:42px;border-radius:10px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);}
.jug-name{font-weight:700;font-size:14px;}.jug-team{font-size:11px;color:var(--muted);}
.jug-badges{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap;}
.jug-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:600;background:rgba(34,197,94,.12);color:var(--green);}
.jug-badge.asist{background:rgba(59,130,246,.12);color:var(--blue);}
.jug-mercado{font-size:12px;color:var(--gold);margin:6px 0 4px;font-weight:700;}
.jug-desc{font-size:13px;color:var(--dim);line-height:1.6;}
.jug-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}.jug-bar-fill{height:100%;background:var(--gold);border-radius:2px;}
.comp-item{margin-bottom:12px;}.comp-label{text-align:center;font-size:12px;color:var(--dim);margin-bottom:5px;font-weight:500;}
.comp-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;}.comp-home{background:var(--cyan);}.comp-away{background:var(--green);}
.comp-vals{display:flex;justify-content:space-between;font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:3px;font-weight:600;}
.comp-vals .h{color:var(--cyan);}.comp-vals .a{color:var(--green);}
.gt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gt-bars{display:flex;gap:4px;align-items:flex-end;height:80px;margin-top:8px;}
.gt-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.gt-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px;}.gt-pct{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.gt-iv{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.pgt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.pgt-box{background:var(--surface2);border-radius:8px;padding:14px;}
.pgt-team{font-weight:700;font-size:13px;margin-bottom:8px;}
.pgt-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;}
.pgt-val{font-family:'JetBrains Mono',monospace;font-weight:700;}
.merc-header{display:grid;grid-template-columns:1fr 55px 55px 55px 1fr;gap:8px;padding:8px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:6px;font-weight:600;}
.mercado-item{background:var(--surface2);border-radius:8px;margin-bottom:6px;border-left:3px solid transparent;}
.mercado-item.aprobado{border-left-color:var(--green);}.mercado-item.marginal{border-left-color:var(--orange);}.mercado-item.rechazado{border-left-color:var(--border);opacity:.65;}
.merc-row{display:grid;grid-template-columns:1fr 55px 55px 55px auto;gap:8px;padding:12px 14px;align-items:center;}
.m-name{font-size:14px;font-weight:600;}.m-tipo{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.m-prob{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;text-align:center;}
.m-prob.high{color:var(--green);}.m-prob.mid{color:var(--gold);}.m-prob.low{color:var(--dim);}
.m-riesgo{font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;color:var(--red);}
.m-cuota{font-family:'JetBrains Mono',monospace;font-size:15px;text-align:center;color:var(--gold);font-weight:700;}
.m-badge{font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700;white-space:nowrap;}
.m-badge.si{background:rgba(34,197,94,.15);color:var(--green);}.m-badge.marginal{background:rgba(245,158,11,.15);color:var(--orange);}.m-badge.no{background:rgba(107,114,128,.1);color:var(--muted);}
.m-sint{font-size:12px;color:var(--dim);line-height:1.5;}
.veredicto{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.veredicto::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green));}
.verd-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.verd-titulo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;margin-bottom:12px;}
.verd-texto{font-size:14px;color:var(--dim);line-height:1.8;margin-bottom:14px;}
.verd-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.verd-mp-label{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.verd-mp{font-size:15px;font-weight:700;color:var(--text);}
.verd-comb-label{font-size:11px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;margin-top:12px;}
.verd-comb{font-size:13px;color:var(--dim);line-height:1.6;}
.verd-aprobados{margin-top:12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--green);}
@media(max-width:768px){
  .layout{grid-template-columns:1fr;height:auto;overflow:auto;}
  .sidebar{max-height:40vh;overflow-y:auto;}
  .main-panel{padding:16px;height:auto;overflow:visible;}
  .u3-grid,.jug-grid,.gt-grid,.pgt-grid,.filtros-nuevos,.team-stats-grid{grid-template-columns:1fr;}
  .merc-header,.merc-row{grid-template-columns:1fr 50px 50px 50px;gap:6px;}
  .merc-header span:last-child,.merc-row>div:last-child{display:none;}
  .m-sint{font-size:11px;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>MATCHIQ</div>
  <div class="tb-right">
    <select id="sel-liga" onchange="buscarPartidos()">{% for k,v in ligas.items() %}<option value="{{k}}">{{v}}</option>{% endfor %}</select>
    <a href="/logout" class="logout-btn">SALIR</a>
  </div>
</div>
<div class="status-bar" id="status-bar"></div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-header"><span class="sb-title">Partidos</span><span class="sb-count" id="sb-count">0</span></div>
    <div class="match-list-wrap" id="match-list"><div class="empty"><p>Cargando...</p></div></div>
    <div class="pag" id="pag"></div>
  </div>
  <div class="main-panel" id="main-panel"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg><p>Seleccioná un partido</p></div></div>
</div>
<script>
const $=s=>document.querySelector(s);
let currentLiga='',matchesData=[],analysisCache={},currentPage=0;
const PER_PAGE=10;
function showStatus(m,e){const el=$('#status-bar');el.textContent=m;el.className='status-bar'+(e?' err':'');el.style.display='block';}
 
async function buscarPartidos(){
  const liga=$('#sel-liga').value;currentLiga=liga;currentPage=0;
  showStatus('Buscando partidos...');
  try{const r=await fetch(`/partidos/${liga}`);const d=await r.json();matchesData=d.response||[];showStatus(`✓ ${matchesData.length} partidos`);renderPage();}
  catch(e){showStatus('✗ '+e.message,true);}
}
 
function renderPage(){
  const total=matchesData.length,pages=Math.ceil(total/PER_PAGE),start=currentPage*PER_PAGE,slice=matchesData.slice(start,start+PER_PAGE);
  $('#sb-count').textContent=total;
  const list=$('#match-list');
  if(!total){list.innerHTML='<div class="empty"><p>Sin partidos</p></div>';$('#pag').innerHTML='';return;}
  list.innerHTML=slice.map((m,i)=>{
    const idx=start+i,d=new Date(m.fecha),ds=d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'}),ts=d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    const finished=m.estado==='FINISHED';
    const c=analysisCache[m.id];let badge='';
    if(c){const n=c.veredicto.total_aprobados;badge=n>0?`<div class="mi-badge show aprobado">${n} ✓</div>`:`<div class="mi-badge show pendiente">—</div>`;}
    return`<div class="match-item${finished?' finished':''}" data-idx="${idx}" onclick="analizarMatch(${idx})"><div class="mi-teams">${m.home} <span>vs</span> ${m.away}${m.resultado?` <span class="mi-result">${m.resultado}</span>`:''}</div><div class="mi-meta"><span>${ds}</span><span>${ts}</span>${m.jornada?`<span>J${m.jornada}</span>`:''}${finished?'<span class="mi-jugado">✓ Jugado</span>':''}${m.arbitro?`<span>🟨 ${m.arbitro}</span>`:''}</div>${badge}</div>`;
  }).join('');
  let pb='';
  if(pages>1){for(let p=0;p<pages;p++)pb+=`<button class="pag-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p+1}</button>`;}
  $('#pag').innerHTML=pb;
}
function goPage(p){currentPage=p;renderPage();}
 
async function analizarMatch(idx){
  const m=matchesData[idx];if(!m)return;
  document.querySelectorAll('.match-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.match-item[data-idx="${idx}"]`)?.classList.add('active');
  if(analysisCache[m.id]){renderAnalisis(analysisCache[m.id],m);return;}
  $('#main-panel').innerHTML=`<div class="loading"><div class="spinner"></div><p>Analizando ${m.home} vs ${m.away}...</p></div>`;
  try{const r=await fetch(`/analizar/${currentLiga}/${m.id}`);const d=await r.json();
    if(d.error){$('#main-panel').innerHTML=`<div class="empty"><p>⚠ ${d.error}</p></div>`;return;}
    analysisCache[m.id]=d;renderAnalisis(d,m);renderPage();
  }catch(e){$('#main-panel').innerHTML=`<div class="empty"><p>✗ ${e.message}</p></div>`;}
}
 
function renderAnalisis(data,match){
  const d=new Date(match.fecha);
  const fecha=d.toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'short'})+' · '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  let h='';
  const f=data.filtros;
  const p=data.probabilidades;
 
  // HEADER
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><div class="card-title" style="margin-bottom:4px">${data.match.home} <span style="color:var(--dim);font-size:15px">vs</span> ${data.match.away}</div><div class="card-sub" style="margin-bottom:0">${data.match.competicion}${data.match.jornada?' · J'+data.match.jornada:''}</div></div><div style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)">${fecha}${data.arbitro?'<br>🟨 '+data.arbitro:''}</div></div>
  <div class="filtros-nuevos">
    <div class="fn-item"><div class="fn-title">Forma reciente</div><div class="fn-vals"><span class="fn-home">${f.Forma.home_val}</span><span class="fn-away">${f.Forma.away_val}</span></div><div class="fn-desc">${f.Forma.desc}</div></div>
    <div class="fn-item"><div class="fn-title">Historial directo</div><div class="fn-vals"><span class="fn-home">${f.Historial.home_val}</span><span class="fn-away">${f.Historial.away_val}</span></div><div class="fn-desc">${f.Historial.desc}</div></div>
    <div class="fn-item"><div class="fn-title">Localía vs Visita</div><div class="fn-vals"><span class="fn-home">${f.Localia.home_val}</span><span class="fn-away">${f.Localia.away_val}</span></div><div class="fn-desc">${f.Localia.desc}</div></div>
    <div class="fn-item"><div class="fn-title">Posición tabla</div><div class="fn-vals"><span class="fn-home">${f.Posicion.home_val}</span><span class="fn-away">${f.Posicion.away_val}</span></div><div class="fn-desc">${f.Posicion.desc}</div></div>
  </div>
  <div class="prob-labels"><span>${data.match.home}</span><span>Empate</span><span>${data.match.away}</span></div>
  <div class="prob-bar"><div class="pb-home" style="width:${p.home}%">${p.home}%</div><div class="pb-draw" style="width:${p.draw}%">${p.draw}%</div><div class="pb-away" style="width:${p.away}%">${p.away}%</div></div>
  <div class="prob-cuotas"><span>@${p.cuota_home}</span><span>@${p.cuota_draw}</span><span>@${p.cuota_away}</span></div>
  <div style="text-align:center;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim)">Goles esperados: <strong style="color:var(--gold);font-size:15px">${data.goles_esperados}</strong></div>`;
 
  if(data.resumen){h+=`<div class="resumen-box"><div class="resumen-label">Resumen pre-partido</div>${data.resumen}</div>`;}
 
  // TEAM STATS BOXES
  if(data.stats_equipo){
    const ts=data.stats_equipo;
    h+=`<div class="team-stats-grid">
      <div class="ts-box"><div class="ts-header">${data.match.home}</div>
        <div class="ts-row"><span class="ts-lbl">Posición</span><span class="ts-val" style="color:var(--gold)">${ts.home.posicion} · ${ts.home.puntos} pts</span></div>
        <div class="ts-row"><span class="ts-lbl">Remates/PJ</span><span class="ts-val">${ts.home.remates_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Al arco/PJ</span><span class="ts-val">${ts.home.al_arco_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Goles/PJ</span><span class="ts-val" style="color:var(--green)">${ts.home.goles_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Goles rec./PJ</span><span class="ts-val" style="color:var(--red)">${ts.home.recibidos_pj}</span></div>
      </div>
      <div class="ts-box"><div class="ts-header">${data.match.away}</div>
        <div class="ts-row"><span class="ts-lbl">Posición</span><span class="ts-val" style="color:var(--gold)">${ts.away.posicion} · ${ts.away.puntos} pts</span></div>
        <div class="ts-row"><span class="ts-lbl">Remates/PJ</span><span class="ts-val">${ts.away.remates_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Al arco/PJ</span><span class="ts-val">${ts.away.al_arco_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Goles/PJ</span><span class="ts-val" style="color:var(--green)">${ts.away.goles_pj}</span></div>
        <div class="ts-row"><span class="ts-lbl">Goles rec./PJ</span><span class="ts-val" style="color:var(--red)">${ts.away.recibidos_pj}</span></div>
      </div>
    </div>`;
  }
 
  h+=`</div>`;
 
  h+=`<div class="card"><div class="card-title">Últimos 3 partidos</div><div class="u3-grid"><div><div class="u3-col-title">${data.match.home}</div>${renderU3(data.ultimos3.home)}</div><div><div class="u3-col-title">${data.match.away}</div>${renderU3(data.ultimos3.away)}</div></div></div>`;
 
  if(data.arbitro){const ap=data.arbitro_perfil;h+=`<div class="card"><div class="card-title">Árbitro</div><div class="arb-box"><div class="arb-icon">🟨</div><div><div class="arb-name">${data.arbitro}</div><div class="arb-label">Árbitro principal</div>${ap&&ap.descripcion?`<div class="arb-desc">${ap.descripcion}</div>`:''}</div></div></div>`;}
 
  h+=`<div class="card"><div class="card-title">Forma reciente (últimos 10)</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${fp(data.match.home,data.forma.home)}${fp(data.match.away,data.forma.away)}</div></div>`;
 
  if(data.h2h.total>0)h+=`<div class="card"><div class="card-title">Head to Head</div><div class="card-sub">${data.h2h.total} partidos · ${data.h2h.total_goals} goles</div><div class="h2h-row"><div class="h2h-item"><div class="h2h-val" style="color:var(--green)">${data.h2h.home_wins}</div><div class="h2h-lbl">${data.match.home}</div></div><div class="h2h-item"><div class="h2h-val">${data.h2h.draws}</div><div class="h2h-lbl">Empates</div></div><div class="h2h-item"><div class="h2h-val" style="color:var(--red)">${data.h2h.away_wins}</div><div class="h2h-lbl">${data.match.away}</div></div></div></div>`;
 
  if(data.posiciones.home||data.posiciones.away)h+=`<div class="card"><div class="card-title">Posiciones</div><div class="h2h-row"><div class="h2h-item"><div class="h2h-val" style="color:var(--gold)">#${data.posiciones.home||'—'}</div><div class="h2h-lbl">${data.match.home} · ${data.posiciones.home_pts||0}pts<br>GF:${data.posiciones.home_gf||0} GC:${data.posiciones.home_gc||0}</div></div><div class="h2h-item"><div class="h2h-val" style="color:var(--gold)">#${data.posiciones.away||'—'}</div><div class="h2h-lbl">${data.match.away} · ${data.posiciones.away_pts||0}pts<br>GF:${data.posiciones.away_gf||0} GC:${data.posiciones.away_gc||0}</div></div></div></div>`;
 
  const sa=data.stats_avanzadas;
  if(sa&&sa.comparativas&&sa.comparativas.length){h+=`<div class="card"><div class="card-title">Estadística predictiva</div>`;sa.comparativas.forEach(c=>{h+=`<div class="comp-item"><div class="comp-label">${c.label}</div><div class="comp-bar"><div class="comp-home" style="width:${c.home}%"></div><div class="comp-away" style="width:${c.away}%"></div></div><div class="comp-vals"><span class="h">${c.home}%</span><span class="a">${c.away}%</span></div></div>`;});h+=`</div>`;}
 
  if(sa&&sa.goles_por_tiempo)h+=`<div class="card"><div class="card-title">Distribución temporal de goles</div><div class="gt-grid">${gc(data.match.home,sa.goles_por_tiempo.home,'var(--cyan)')}${gc(data.match.away,sa.goles_por_tiempo.away,'var(--green)')}</div></div>`;
 
  if(sa&&sa.prob_gol_tiempo){const pg=sa.prob_gol_tiempo;h+=`<div class="card"><div class="card-title">Probabilidad de gol por tiempo</div><div class="pgt-grid"><div class="pgt-box"><div class="pgt-team" style="color:var(--cyan)">${data.match.home}</div><div class="pgt-row"><span>Gol en 1er tiempo</span><span class="pgt-val" style="color:var(--cyan)">${pg.home_1st}%</span></div><div class="pgt-row"><span>Gol en 2do tiempo</span><span class="pgt-val" style="color:var(--gold)">${pg.home_2nd}%</span></div></div><div class="pgt-box"><div class="pgt-team" style="color:var(--green)">${data.match.away}</div><div class="pgt-row"><span>Gol en 1er tiempo</span><span class="pgt-val" style="color:var(--green)">${pg.away_1st}%</span></div><div class="pgt-row"><span>Gol en 2do tiempo</span><span class="pgt-val" style="color:var(--gold)">${pg.away_2nd}%</span></div></div></div></div>`;}
 
  if(sa&&sa.tarjetas){const t=sa.tarjetas;h+=`<div class="card"><div class="card-title">Tarjetas en la temporada</div><div class="h2h-row"><div class="h2h-item"><div class="h2h-val" style="color:var(--orange)">${t.home_yellow}</div><div class="h2h-lbl">${data.match.home} 🟨<br>${t.home_yellow_avg}/P</div></div><div class="h2h-item"><div class="h2h-val" style="color:var(--orange)">${t.away_yellow}</div><div class="h2h-lbl">${data.match.away} 🟨<br>${t.away_yellow_avg}/P</div></div><div class="h2h-item"><div class="h2h-val" style="color:var(--red)">${t.home_red}</div><div class="h2h-lbl">${data.match.home} 🟥</div></div><div class="h2h-item"><div class="h2h-val" style="color:var(--red)">${t.away_red}</div><div class="h2h-lbl">${data.match.away} 🟥</div></div></div></div>`;}
 
  const aj=[...(data.jugadores.home||[]).map(j=>({...j,team:data.match.home})),...(data.jugadores.away||[]).map(j=>({...j,team:data.match.away}))];
  if(aj.length){h+=`<div class="card"><div class="card-title">Jugadores destacados</div><div class="jug-grid">`;aj.forEach(j=>{const ini=j.nombre.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();h+=`<div class="jug-card"><div class="jug-top"><div class="jug-avatar">${ini}</div><div><div class="jug-name">${j.nombre}</div><div class="jug-team">${j.team}</div></div></div><div class="jug-badges"><span class="jug-badge">${j.goles} GOL</span>${j.asistencias?`<span class="jug-badge asist">${j.asistencias} AST</span>`:''}<span class="jug-badge" style="background:rgba(212,165,55,.12);color:var(--gold)">${j.partidos} PJ</span></div>${j.mercado_sugerido?`<div class="jug-mercado">Mercado: ${j.mercado_sugerido}</div>`:''}<div class="jug-desc">${j.descripcion||''}</div><div class="jug-bar"><div class="jug-bar-fill" style="width:${Math.min(100,j.goles/20*100)}%"></div></div></div>`;});h+=`</div></div>`;}
 
  h+=`<div class="card"><div class="card-title">Mercados evaluados</div><div class="merc-header"><span>Mercado</span><span style="text-align:center">Prob.</span><span style="text-align:center">Riesgo</span><span style="text-align:center">Cuota</span><span>Síntesis</span></div>`;
  if(!data.mercados.length)h+=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Sin mercados</div>`;
  else data.mercados.forEach(m=>{let cls,bc,bt;if(m.aprobado){cls='aprobado';bc='si';bt='APROBADO';}else if(m.prob>=50){cls='marginal';bc='marginal';bt='MARGINAL';}else{cls='rechazado';bc='no';bt='NO APROBADO';}const pc=m.prob>=70?'high':m.prob>=55?'mid':'low';h+=`<div class="mercado-item ${cls}"><div class="merc-row"><div><div class="m-name">${m.mercado}</div><div class="m-tipo">${m.tipo} <span class="m-badge ${bc}">${bt}</span></div></div><div class="m-prob ${pc}">${m.prob}%</div><div class="m-riesgo">${m.riesgo}%</div><div class="m-cuota">@${m.cuota}</div><div class="m-sint">${m.sintesis||''}</div></div></div>`;});
  h+=`</div>`;
 
  if(data.veredicto){const v=data.veredicto;h+=`<div class="veredicto"><div class="verd-label">Veredicto final</div><div class="verd-titulo">${v.favorito?`Victoria de ${v.favorito} en tiempo reglamentario`:'Partido parejo — sin favorito claro'}</div><div class="verd-texto">${v.texto}</div><div class="verd-section"><div class="verd-mp-label">Mercado principal</div><div class="verd-mp">${v.mercado_principal}</div>${v.combinable?`<div class="verd-comb-label">Combinable</div><div class="verd-comb">${v.combinable}</div>`:''}</div><div class="verd-aprobados">Mercados aprobados: ${v.mercados_aprobados}</div></div>`;}
 
  $('#main-panel').innerHTML=h;
}
 
function renderU3(m){if(!m||!m.length)return'<div style="color:var(--muted);font-size:12px;padding:8px">Sin datos</div>';return m.map(x=>`<div class="u3-match ${x.resultado}"><div><span class="u3-fecha">${new Date(x.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})}</span> <span>${x.local?'vs':'@'} ${x.rival}</span> <span class="u3-comp">(${x.competicion})</span></div><div class="u3-score ${x.resultado}">${x.marcador}</div></div>`).join('');}
function fp(n,f){return`<div><div style="font-size:13px;font-weight:700;margin-bottom:6px">${n}</div><div class="forma-row">${f.form?f.form.split('').map(c=>`<div class="f-dot ${c}">${c}</div>`).join(''):'<span style="color:var(--muted);font-size:11px">Sin datos</span>'}</div><div class="stats-row"><div class="stat-box"><div class="stat-val" style="color:var(--green)">${f.w}</div><div class="stat-lbl">Ganados</div></div><div class="stat-box"><div class="stat-val">${f.d}</div><div class="stat-lbl">Empates</div></div><div class="stat-box"><div class="stat-val" style="color:var(--red)">${f.l}</div><div class="stat-lbl">Perdidos</div></div></div><div class="stats-row"><div class="stat-box"><div class="stat-val">${f.gf_avg}</div><div class="stat-lbl">GF/P</div></div><div class="stat-box"><div class="stat-val">${f.gc_avg}</div><div class="stat-lbl">GC/P</div></div><div class="stat-box"><div class="stat-val" style="color:var(--gold)">${f.ppg}</div><div class="stat-lbl">PPG</div></div></div><div class="stats-row"><div class="stat-box"><div class="stat-val">${f.clean_sheets}</div><div class="stat-lbl">Valla 0</div></div><div class="stat-box"><div class="stat-val">${f.failed_to_score}</div><div class="stat-lbl">Sin gol</div></div><div class="stat-box"><div class="stat-val">${f.gf}</div><div class="stat-lbl">GF Tot</div></div></div></div>`;}
function gc(n,d,c){const mx=Math.max(...d.map(x=>x.pct),1);return`<div><div style="font-size:13px;font-weight:700;margin-bottom:4px">${n}</div><div class="gt-bars">${d.map(x=>`<div class="gt-bar"><div class="gt-pct" style="color:${c}">${x.pct}%</div><div class="gt-fill" style="height:${Math.max(4,x.pct/mx*70)}px;background:${c}"></div><div class="gt-iv">${x.intervalo}</div></div>`).join('')}</div></div>`;}
 
document.addEventListener('DOMContentLoaded',()=>buscarPartidos());
</script>
</body>
</html>
