<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutBet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#1e2430;
    --gold:#f0b429;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#6b7280;--dim:#9ca3af;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

  /* TOP BAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);}
  .brand{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px;}
  .topbar-right{display:flex;gap:10px;align-items:center;}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;}
  .btn-buscar{background:var(--gold);color:#0a0c10;border:none;border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
  .btn-buscar:disabled{opacity:0.4;}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 57px);}

  /* LISTA IZQUIERDA */
  .lista-panel{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
  .lista-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
  .match-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative;}
  .match-item:hover{background:var(--surface2);}
  .match-item.active{background:var(--surface2);border-left:3px solid var(--gold);}
  .match-item.loading-item{opacity:0.5;}
  .mi-teams{font-weight:600;font-size:13px;margin-bottom:4px;}
  .mi-meta{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .mi-badges{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
  .badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .badge-green{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
  .badge-yellow{background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.2);}
  .badge-gray{background:rgba(107,114,128,0.1);color:var(--muted);border:1px solid rgba(107,114,128,0.2);}
  .badge-loading{background:rgba(240,180,41,0.06);color:var(--gold);border:1px solid rgba(240,180,41,0.1);}

  /* PANEL DERECHO */
  .detalle-panel{overflow-y:auto;padding:24px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:8px;}
  .empty-icon{font-size:40px;margin-bottom:8px;}
  .empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--dim);letter-spacing:1px;}
  .empty-sub{font-size:12px;}

  /* CARD DETALLE */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;max-width:640px;}
  .card-header{background:linear-gradient(135deg,#0f1319,#151a24);border-bottom:1px solid var(--border);padding:20px 24px;position:relative;}
  .competition-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.25);border-radius:6px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .teams-row{display:flex;align-items:center;gap:12px;}
  .team-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
  .vs-sep{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .card-meta{font-size:11px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace;}

  /* FILTROS */
  .filters-row{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;background:rgba(255,255,255,0.01);}
  .filter-tag{background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.2);border-radius:5px;padding:3px 9px;font-size:11px;color:#c99a2e;font-weight:500;}
  .filter-code{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:10px;margin-right:4px;}

  /* PROB BASE */
  .prob-base-bar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .prob-base-label{font-size:11px;color:var(--muted);white-space:nowrap;}
  .prob-base-track{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
  .prob-base-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),#e09a20);}
  .prob-base-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;}

  /* MERCADOS */
  .markets-section{padding:16px 20px;}
  .section-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
  .market-row{display:grid;grid-template-columns:1fr 70px 60px;align-items:center;gap:10px;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;}
  .market-row.aprobado{border-left:3px solid var(--green);}
  .market-row.informativo{border-left:3px solid #374151;opacity:0.6;}
  .market-name{font-weight:600;font-size:12px;}
  .prob-num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--green);text-align:center;}
  .prob-label{font-size:9px;color:var(--muted);text-transform:uppercase;text-align:center;}
  .risk-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:center;}
  .risk-low{color:var(--green);}
  .risk-med{color:#fbbf24;}
  .risk-high{color:var(--red);}
  .risk-label{font-size:9px;color:var(--muted);text-transform:uppercase;text-align:center;}

  .card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;background:rgba(0,0,0,0.2);}
  .footer-note{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .footer-brand{font-family:'Bebas Neue',sans-serif;color:var(--gold);font-size:15px;letter-spacing:2px;}

  /* STATUS */
  .status-bar{padding:8px 24px;font-family:'JetBrains Mono',monospace;font-size:11px;display:none;border-bottom:1px solid var(--border);}
  .status-bar.ok{background:rgba(34,197,94,0.05);color:var(--green);}
  .status-bar.err{background:rgba(239,68,68,0.05);color:var(--red);}
  .status-bar.loading{background:rgba(240,180,41,0.05);color:var(--gold);}

  @media(max-width:700px){
    .layout{grid-template-columns:1fr;}
    .detalle-panel{display:none;}
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">⚡ ScoutBet</div>
  <div class="topbar-right">
    <select id="liga">
      {% for id, nombre in ligas.items() %}
      <option value="{{ id }}">{{ nombre }}</option>
      {% endfor %}
    </select>
    <select id="temporada">
      <option value="2024" selected>2024</option>
      <option value="2023">2023</option>
    </select>
    <button class="btn-buscar" id="btn" onclick="buscar()">→ Buscar</button>
  </div>
</div>

<!-- STATUS -->
<div class="status-bar" id="st"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LISTA -->
  <div class="lista-panel">
    <div class="lista-header">Partidos <span id="count"></span></div>
    <div id="lista"></div>
  </div>

  <!-- DETALLE -->
  <div class="detalle-panel" id="detalle">
    <div class="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">ScoutBet</div>
      <div class="empty-sub">Buscá partidos y hacé click para ver el análisis</div>
    </div>
  </div>

</div>

<script>
let analisisCache = {};
let fixturesData = [];

async function buscar(){
  const liga = document.getElementById('liga').value;
  const temp = document.getElementById('temporada').value;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  show('loading','⏳ Buscando partidos...');
  document.getElementById('lista').innerHTML = '';
  document.getElementById('count').textContent = '';
  analisisCache = {};

  try {
    const r = await fetch(`/partidos/${liga}/${temp}`);
    const data = await r.json();
    fixturesData = data.response || [];

    if (!fixturesData.length){
      show('ok','Sin partidos para esta liga/temporada.');
      btn.disabled = false; return;
    }

    show('ok', `✓ ${fixturesData.length} partidos encontrados`);
    document.getElementById('count').textContent = `(${fixturesData.length})`;
    renderLista(fixturesData);

    

  } catch(e){ show('err','✗ Error: '+e.message); }
  btn.disabled = false;
}

function renderLista(fixtures){
  document.getElementById('lista').innerHTML = fixtures.map((f,i) => {
    const d = new Date(f.fixture.date);
    const fecha = d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
    const hora = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="match-item loading-item" id="item-${f.fixture.id}" onclick="verDetalle(${f.fixture.id}, '${f.league.name}')">
      <div class="mi-teams">${f.teams.home.name} <span style="color:var(--muted);font-weight:400">vs</span> ${f.teams.away.name}</div>
      <div class="mi-meta">📅 ${fecha} · ${hora}</div>
      <div class="mi-badges" id="badges-${f.fixture.id}">
      <span class="badge badge-gray">Click para analizar</span>
      </div>
    </div>`;
  }).join('');
}

async function analizarTodos(fixtures){
  for(const f of fixtures){
    try {
      const r = await fetch(`/analizar/${f.fixture.id}`);
      const d = await r.json();
      analisisCache[f.fixture.id] = d;
      actualizarBadges(f.fixture.id, d);
    } catch(e){}
    await sleep(300); // evitar rate limit
  }
}

function actualizarBadges(fid, d){
  const item = document.getElementById(`item-${fid}`);
  const badges = document.getElementById(`badges-${fid}`);
  if(!item || !badges) return;

  item.classList.remove('loading-item');

  const aprobados = d.mercados.filter(m => m.tipo === 'aprobado');
  const filtros = d.filtros || [];

  let html = '';
  if(aprobados.length > 0){
    html += `<span class="badge badge-green">✓ ${aprobados.length} aprobado${aprobados.length>1?'s':''}</span>`;
  }
  filtros.forEach(f => {
    html += `<span class="badge badge-yellow">${f.codigo}</span>`;
  });
  if(!aprobados.length && !filtros.length){
    html += `<span class="badge badge-gray">Sin señales</span>`;
  }

  badges.innerHTML = html;
}

function verDetalle(fid, liga){
  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`item-${fid}`).classList.add('active');

  const d = analisisCache[fid];
  const detalle = document.getElementById('detalle');

  if(!d){
    detalle.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Analizando...</div><div class="empty-sub">Esperá un momento</div></div>`;
    return;
  }

  const aprobados = d.mercados.filter(m => m.tipo === 'aprobado').length;
  const prob = d.prob_base || 0;

  detalle.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="competition-tag">🏆 ${liga}</div>
        <div class="teams-row">
          <div class="team-name">${d.local}</div>
          <div class="vs-sep">vs</div>
          <div class="team-name" style="color:var(--muted)">${d.visitante}</div>
        </div>
        <div class="card-meta">⚡ ${aprobados} mercado${aprobados!==1?'s':''} aprobado${aprobados!==1?'s':''} · Prob. base local: ${prob}%</div>
      </div>

      <div class="filters-row">
        ${d.filtros.length ? d.filtros.map(f=>`<div class="filter-tag"><span class="filter-code">${f.codigo}</span>${f.descripcion}</div>`).join('') : '<span style="font-size:11px;color:var(--muted)">Sin filtros detectados</span>'}
      </div>

      <div class="prob-base-bar">
        <div class="prob-base-label">Prob. base local</div>
        <div class="prob-base-track"><div class="prob-base-fill" style="width:${prob}%"></div></div>
        <div class="prob-base-val">${prob}%</div>
      </div>

      <div class="markets-section">
        <div class="section-title">Mercados analizados</div>
        ${d.mercados.map(m => {
          const rc = m.riesgo <= 10 ? 'risk-low' : m.riesgo <= 20 ? 'risk-med' : 'risk-high';
          return `<div class="market-row ${m.tipo}">
            <div class="market-name">${m.nombre}</div>
            <div><div class="prob-num">${m.prob}%</div><div class="prob-label">prob.</div></div>
            <div><div class="risk-num ${rc}">${m.riesgo}%</div><div class="risk-label">riesgo</div></div>
          </div>`;
        }).join('')}
      </div>

      <div class="card-footer">
        <div class="footer-note">Análisis automático ScoutBet</div>
        <div class="footer-brand">ScoutBet</div>
      </div>
    </div>`;
}

function show(t,m){const e=document.getElementById('st');e.style.display='block';e.className='status-bar '+t;e.textContent=m;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
